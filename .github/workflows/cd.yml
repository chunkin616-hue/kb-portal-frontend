name: CD

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'uat'
        type: choice
        options:
          - uat
          - production

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    outputs:
      deployed: ${{ steps.deploy_marker.outputs.deployed }}
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || 'uat' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Set deployment port
        run: |
          case ${{ env.ENVIRONMENT }} in
            uat)
              echo "DEPLOY_PORT=3004" >> $GITHUB_ENV
              ;;
            production)
              echo "DEPLOY_PORT=3005" >> $GITHUB_ENV
              ;;
            *)
              echo "DEPLOY_PORT=3003" >> $GITHUB_ENV
              ;;
          esac

      - name: Create deployment marker
        id: deploy_marker
        run: |
          DEPLOY_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          
          echo "### Frontend Deployment Info" > deployment-info.md
          echo "**Environment:** ${{ env.ENVIRONMENT }}" >> deployment-info.md
          echo "**Deployed at:** $DEPLOY_TIME" >> deployment-info.md
          echo "**Commit:** ${{ github.sha }}" >> deployment-info.md
          echo "**Branch:** ${{ github.ref }}" >> deployment-info.md
          echo "**Runner:** ${{ runner.os }}" >> deployment-info.md
          echo "**Port:** ${{ env.DEPLOY_PORT }}" >> deployment-info.md
          
          echo "deployed=true" >> $GITHUB_OUTPUT

      - name: Commit deployment info
        run: |
          git config user.name "CI/CD"
          git config user.email "ci@afe.com"
          git add deployment-info.md
          git commit -m "Deploy Frontend: ${{ github.sha }}" || echo "No changes to commit"
          git push

      - name: Deploy to UAT
        if: (github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'uat') && github.event_name == 'workflow_dispatch'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          echo "Deploying to UAT environment (port 3004)"
          # Add deployment commands here
          # Example: rsync or scp to UAT server
          # echo "$DEPLOY_KEY" > deploy_key && chmod 600 deploy_key
          # scp -i deploy_key -r . $DEPLOY_USER@$DEPLOY_HOST:/path/to/uat

      - name: Deploy to Production
        if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          echo "Deploying to Production environment (port 3005)"
          # Add deployment commands here
          # Example: rsync or scp to production server
