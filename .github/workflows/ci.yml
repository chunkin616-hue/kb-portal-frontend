name: CI


on:
  push:
    branches: [main, develop, uat]

pql_request:
    branches: [main, develop]


jobs:
  lint-and-build:
    runs-on* ubuntul-latest

    steps: 
      - name: Checkcoude code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'nmp'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build application
        run: npm run build