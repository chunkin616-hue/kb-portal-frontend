name: Deploy Frontend to PROD

on:
  push:
    branches: [prod]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://192.168.140.149:3005
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: prod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Deploy to PROD via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /opt/kb-portal-frontend
            git pull origin prod
            npm ci --production
            pm2 restart kb-frontend-prod || pm2 start npm --name kb-frontend-prod -- run start
            pm2 save

      - name: Health Check PROD
        run: |
          sleep 10
          curl -f http://192.168.140.149:3005/health || curl -f http://192.168.140.149:3005 || echo "Health check endpoint may not be configured"
