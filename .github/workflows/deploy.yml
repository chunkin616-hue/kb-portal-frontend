name: Deploy Frontend

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - uat
          - production

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set deployment target
        id: target
        run: |
          case ${{ github.event.inputs.environment }} in
            dev)
              echo "port=3003" >> $GITHUB_OUTPUT
              echo "Deploying to DEV environment (port 3003)"
              ;;
            uat)
              echo "port=3004" >> $GITHUB_OUTPUT
              echo "Deploying to UAT environment (port 3004)"
              ;;
            production)
              echo "port=3013" >> $GITHUB_OUTPUT
              echo "Deploying to Production environment (port 3013)"
              ;;
          esac
      
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 192.168.140.149
          username: kenchan
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /Users/kenchan/.openclaw/workspace/kb-portal-frontend
            git pull origin main
            npm install
            npm run build
            pm2 restart kb-frontend-${{ github.event.inputs.environment }} || pm2 start npm --name kb-frontend-${{ github.event.inputs.environment }} -- run start
            pm2 save
